name: On-Demand Reading List

on:
  issues:
    types: [labeled]

jobs:
  generate-reading-list:
    # Only run when the vc-query label is applied
    if: github.event.label.name == 'vc-query'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract topic from issue title
        id: topic
        env:
          TITLE: ${{ github.event.issue.title }}
        run: |
          # Strip leading "Query: " or "query: " prefix if present
          TOPIC="${TITLE#Query: }"
          TOPIC="${TOPIC#query: }"
          echo "value=$TOPIC" >> "$GITHUB_OUTPUT"

      - name: Generate and post reading list
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python src/digest.py on-demand \
            "${{ github.event.issue.number }}" \
            "${{ steps.topic.outputs.value }}"
