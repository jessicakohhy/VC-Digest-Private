name: On-Demand Reading List

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic for reading list (e.g. vertical SaaS in SEA)"
        required: true
        type: string

jobs:
  generate-reading-list:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send reading list
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python src/digest.py on-demand "${{ github.event.inputs.topic }}"
